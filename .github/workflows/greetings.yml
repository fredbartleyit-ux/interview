name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Thank you for accessing Fred Bartley's Interview GitHub Repository.  Use responsibly.' first issue"
        pr-message: "You have created a pull request from Fred Bartley's Interview Github Repository.   I will review as soon as I can.' first pull request"
